{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GymGoers{% endblock %}</title>

    {% tailwind_css %}

    <script src="https://unpkg.com/htmx.org@2.0.3" defer></script>
    <script src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js" defer></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">

    {% include "partials/nav.html" %}

    {% if messages %}
        <div class="max-w-4xl mx-auto mt-4 px-4 w-full">
            {% for message in messages %}
                <div class="px-4 py-3 rounded-md mb-2 {% if message.tags == 'error' %}bg-red-100 text-red-800{% elif message.tags == 'success' %}bg-green-100 text-green-800{% else %}bg-blue-100 text-blue-800{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <main class="flex-grow max-w-4xl mx-auto w-full px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-slate-800 text-slate-300 py-4 text-center text-sm">
        <p>GymGoers &copy; 2026 &middot; <a href="https://github.com/ElMarcio/gymgoers" class="underline hover:text-white">GitHub</a></p>
    </footer>

</body>
</html>
