{% extends "base.html" %}

{% block title %}Recuperar palavra-passe{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-8">
    <h1 class="text-3xl font-bold text-slate-800 mb-4">Recuperar palavra-passe</h1>
    <p class="text-slate-600 mb-6">Introduz o teu email. Enviamos-te um link para definir uma nova palavra-passe.</p>

    <form method="post" class="bg-white p-6 rounded-lg shadow space-y-4">
        {% csrf_token %}

        <div>
            <label for="id_email" class="block text-sm font-medium text-slate-700 mb-1">Email</label>
            <input type="email" name="email" id="id_email" required autofocus
                   class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>

        <button type="submit" class="w-full py-2 bg-indigo-600 text-white rounded-md font-semibold hover:bg-indigo-700 transition">
            Enviar link
        </button>
    </form>
</div>
{% endblock %}
