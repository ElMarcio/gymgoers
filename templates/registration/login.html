{% extends "base.html" %}

{% block title %}Entrar — GymGoers{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-8">
    <h1 class="text-3xl font-bold text-slate-800 mb-6 text-center">Entrar</h1>

    {% if form.errors %}
        <div class="bg-red-100 border border-red-300 text-red-800 px-4 py-3 rounded mb-4">
            Utilizador ou palavra-passe inválidos.
        </div>
    {% endif %}

    <form method="post" class="bg-white p-6 rounded-lg shadow space-y-4">
        {% csrf_token %}

        <div>
            <label for="id_username" class="block text-sm font-medium text-slate-700 mb-1">Utilizador</label>
            <input type="text" name="username" id="id_username" required autofocus
                   class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>

        <div>
            <label for="id_password" class="block text-sm font-medium text-slate-700 mb-1">Palavra-passe</label>
            <input type="password" name="password" id="id_password" required
                   class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>

        <button type="submit" class="w-full py-2 bg-indigo-600 text-white rounded-md font-semibold hover:bg-indigo-700 transition">
            Entrar
        </button>

        <input type="hidden" name="next" value="{{ next }}">
    </form>

    <div class="mt-4 text-center text-sm text-slate-600 space-y-2">
        <p><a href="{% url 'password_reset' %}" class="text-indigo-600 hover:underline">Esqueci a palavra-passe</a></p>
        <p>Ainda não tens conta? <a href="{% url 'accounts:signup' %}" class="text-indigo-600 hover:underline">Registar</a></p>
    </div>
</div>
{% endblock %}
