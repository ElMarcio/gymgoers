{% extends "base.html" %}

{% block title %}Exercícios — GymGoers{% endblock %}

{% block content %}
<section class="mb-6">
    <h1 class="text-3xl font-bold text-slate-800 mb-2">Catálogo de Exercícios</h1>
    <p class="text-slate-600">Pesquisa e filtra para encontrar o exercício certo.</p>
</section>

<form id="exercise-search"
      hx-get="{% url 'exercises:list' %}"
      hx-trigger="keyup changed delay:300ms from:#search-input, change from:#muscle-group-select"
      hx-target="#exercise-results"
      hx-push-url="true"
      class="bg-white p-4 rounded-lg shadow mb-6 grid grid-cols-1 md:grid-cols-3 gap-4">

    <div class="md:col-span-2">
        <label for="search-input" class="block text-sm font-medium text-slate-700 mb-1">Pesquisar</label>
        <input type="search" id="search-input" name="q" value="{{ query }}"
               placeholder="ex: bench press, squat..."
               class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
    </div>

    <div>
        <label for="muscle-group-select" class="block text-sm font-medium text-slate-700 mb-1">Grupo muscular</label>
        <select id="muscle-group-select" name="muscle_group"
                class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <option value="">Todos</option>
            {% for value, label in muscle_groups %}
                <option value="{{ value }}" {% if value == selected_muscle_group %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
        </select>
    </div>
</form>

<div id="exercise-results">
    {% include "exercises/_exercise_list_fragment.html" %}
</div>
{% endblock %}
